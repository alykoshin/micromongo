name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Test matrix across maintained Node versions. Runs the real gate (build +
  # tests + type tests + bundle smokes) but NOT `npm test` — that also runs
  # npm-audit and a dependency-freshness check, which would turn CI red on any
  # newly-published advisory unrelated to the change (see CLAUDE.md).
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run _test

  # Separate job: produce coverage once (on the primary Node) and upload the
  # LCOV to Coveralls. Uses the official action (no `coveralls` npm package, no
  # deprecated `request` chain); on public repos it authenticates via the
  # built-in GITHUB_TOKEN — no secret to configure.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # _test runs the suite under nyc (writes .nyc_output); _test-report emits
      # coverage/lcov.info for the uploader.
      - run: npm run _test
      - run: npm run _test-report
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage/lcov.info
